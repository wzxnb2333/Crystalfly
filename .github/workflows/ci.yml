name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Crystalfly.slnx

      - name: Build
        run: dotnet build Crystalfly.slnx -c Release --no-restore

      - name: Test
        run: dotnet test Crystalfly.slnx -c Release --no-build
