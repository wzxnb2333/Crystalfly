name: Update Mod activity catalog

on:
  workflow_dispatch:
  schedule:
    - cron: '25 3 * * 1'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout ModLinks history
        run: git clone https://github.com/hk-modding/modlinks.git "$RUNNER_TEMP/modlinks"
      - name: Generate activity catalog
        shell: pwsh
        run: >-
          ./scripts/update-mod-activity.ps1
          -ModLinksRepository "$env:RUNNER_TEMP/modlinks"
          -OutputPath ./catalog/mod-activity.v1.json
      - name: Commit catalog update
        shell: bash
        run: |
          if git diff --quiet -- catalog/mod-activity.v1.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add catalog/mod-activity.v1.json
          git commit -m "chore: update Mod activity catalog"
          git push
